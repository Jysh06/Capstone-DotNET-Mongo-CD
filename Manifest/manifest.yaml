apiVersion: v1
kind: ServiceAccount
metadata:
  name: noteapp-sa
  namespace: webapps
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-noteapp
  namespace: webapps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dotnet-noteapp
  template:
    metadata:
      labels:
        app: dotnet-noteapp
    spec:
      serviceAccountName: noteapp-sa
      containers:
        - name: dotnet-noteapp
          image: jysh06/noteapp:v14
          imagePullPolicy: Always
          ports:
            - containerPort: 5050

          env:
            - name: DOTNET_ENVIRONMENT
              value: Development

            - name: MONGODB_CONNECTIONSTRING
              value: "mongodb://mongo-0.mongo.webapps.svc.cluster.local:27017,mongo-1.mongo.webapps.svc.cluster.local:27017,mongo-2.mongo.webapps.svc.cluster.local:27017/NoteDb?replicaSet=rs0"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 5050
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 5050
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: dotnet-noteapp
  namespace: webapps
spec:
  type: LoadBalancer
  selector:
    app: dotnet-noteapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5050
